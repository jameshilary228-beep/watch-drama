<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Drama Player</title>
    
    <script>(function(s){s.dataset.zone='10885175',s.src='https://al5sm.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

    <style>
        body { margin: 0; background-color: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .wrapper { width: 95%; max-width: 800px; }
        .video-box { position: relative; width: 100%; aspect-ratio: 16/9; background: #111; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        #player-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; background: url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=800') center/cover; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .play-btn { width: 70px; height: 70px; background: rgba(255, 0, 0, 0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .play-btn::after { content: ''; border-style: solid; border-width: 12px 0 12px 20px; border-color: transparent transparent transparent white; margin-left: 5px; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .info { margin-top: 15px; }
        .title { font-size: 1.1rem; font-weight: bold; }
        .meta { color: #888; font-size: 0.9rem; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="video-box">
            <div id="player-overlay" onclick="startDrama()">
                <div class="play-btn"></div>
            </div>
            
            <div id="video-container" style="display:none;">
                <iframe id="main-video" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>

        <div class="info">
            <div class="title" id="display-title">UK Trending Drama - Episode 04 (Full HD)</div>
            <div class="meta">1.4M views • <span style="color:red;">● LIVE</span></div>
        </div>
    </div>

    <script>
        function startDrama() {
            // THE AUTOMATIC LINK (Our bot go change this one later)
            var videoId = "dQw4w9WgXcQ"; 
            
            // 1. Show the ad (handled by Monetag script in head)
            
            // 2. Hide overlay and show the real video inside the page
            document.getElementById('player-overlay').style.display = 'none';
            document.getElementById('video-container').style.display = 'block';
            document.getElementById('main-video').src = "https://www.youtube.com/embed/" + videoId + "?autoplay=1";
        }
    </script>

</body>
</html>
